{% extends "layout.html" %}

{% block content %}
<div class="centered-form">
    <div class="card">
        <h2>Reset Password</h2>
        <p class="subtitle">Answer your security question to reset.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert-box">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
        
        <form action="/reset_password" method="POST">
            <input type="text" name="username" placeholder="Enter your username" required>
            
            <label style="text-align: left; display: block; margin-top: 10px; font-weight: 500;">Security Answer:</label>
            <input type="text" name="security_answer" placeholder="e.g., Fluffy" required>
            
            <label style="text-align: left; display: block; margin-top: 10px; font-weight: 500;">New Password:</label>
            <input type="password" name="new_password" placeholder="Enter new password" required>
            
            <button type="submit">Reset Password</button>
        </form>
        
        <p style="margin-top: 20px;">
            <a href="{{ url_for('login') }}">Back to Login</a>
        </p>
    </div>
</div>
{% endblock %}
