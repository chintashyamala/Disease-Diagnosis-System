{% extends "layout.html" %}

{% block content %}
<div class="centered-form">
    <div class="card">
        <h2>Create Account</h2>
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Choose a username" required>
            <input type="password" name="password" placeholder="Create a password" required>
            
            <label style="text-align: left; display: block; margin-top: 10px; font-weight: 500;">Security Question:</label>
            <select name="security_question" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #cbd5e1;">
                <option value="pet">What is your first pet's name?</option>
                <option value="city">In what city were you born?</option>
                <option value="school">What was the name of your first school?</option>
            </select>
            
            <input type="text" name="security_answer" placeholder="Your Answer" required>
            
            <button type="submit">Create Account</button>
        </form>
    </div>
</div>
{% endblock %}
